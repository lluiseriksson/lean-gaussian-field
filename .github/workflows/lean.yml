name: Lean

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          use-github-cache: true
      - name: No Lean placeholders on main
        if: github.ref == 'refs/heads/main'
        run: |
          if grep -R --include='*.lean' -nE '\b(sorry|admit)\b' .; then
            echo "Lean placeholder found on main"
            exit 1
          fi
